<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monkey.chat | Server Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-guilds: #070a08;
            --bg-channels: #0f1511;
            --bg-chat: #141d17;
            --banana: #f4d03f;
            --text-light: #f0f4f1;
            --text-muted: #7f9184;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-chat); color: var(--text-light); height: 100vh; display: flex; overflow: hidden; }

        /* Column 1: Guilds Icons */
        .guilds-bar { width: 72px; background: var(--bg-guilds); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; }
        .guild-icon { width: 48px; height: 48px; background: #223126; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; transition: all 0.2s; }
        .guild-icon:hover, .guild-icon.active { border-radius: 16px; background: var(--banana); color: #000; }

        /* Column 2: Channels */
        .channels-sidebar { width: 240px; background: var(--bg-channels); display: flex; flex-direction: column; }
        .server-header { padding: 16px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .channel-list { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .ch-category { font-size: 0.7rem; uppercase; font-weight: 700; color: var(--text-muted); margin-top: 16px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .channel-item { padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; }
        .channel-item:hover, .channel-item.active { background: rgba(255,255,255,0.05); color: var(--text-light); }
        .channel-item.active-voice { color: var(--banana); font-weight: 600; }

        /* Column 3: Center & Video Grid Space */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .view-header { height: 56px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 20px; font-weight: 600; }
        
        .content-split { flex: 1; display: flex; overflow: hidden; }
        .video-arena { flex: 2; background: #0b0f0c; padding: 12px; display: flex; flex-direction: column; gap: 12px; position: relative; }
        .video-grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 12px; 
            overflow-y: auto; 
            align-content: start; 
            padding-bottom: 80px; /* Space for dock */
        }
        
        .video-box { 
            background: #1a261d; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            aspect-ratio: 4/3; /* Better for portrait/squarish mobile cams */
            border: 1px solid rgba(255,255,255,0.1); 
            transition: transform 0.2s;
        }
        .video-box:hover { transform: scale(1.02); z-index: 5; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        .user-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; }

        /* Text Chat Sub-panel */
        .chat-sub-panel { flex: 1; background: var(--bg-chat); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .msg-feed { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-line { font-size: 0.9rem; line-height: 1.4; }
        .msg-line b { color: var(--banana); margin-right: 6px; }
        .input-bar { padding: 16px; background: rgba(0,0,0,0.2); display: flex; }
        .input-bar input { flex: 1; background: rgba(255,255,255,0.05); border: none; padding: 12px; border-radius: 8px; color: #fff; outline: none; }

        /* Bottom Floating Bar inside Video Arena */
        .dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #121a14; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 16px; display: flex; gap: 12px; z-index: 10; }
        .dock button { background: rgba(255,255,255,0.05); border: none; color: white; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .dock button.hangup { background: var(--danger); }
        .dock button.active { background: var(--banana); color: #000; }
    </style>
</head>
<body>

    <div id="loginOverlay" style="position: fixed; inset: 0; background: #070a08; display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: #141d17; padding: 32px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 300px;">
            <h2 style="margin-bottom: 24px;">Login to Monkey Chat</h2>
            <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: none; border-radius: 6px; color: #fff;">
            <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 24px; background: rgba(255,255,255,0.05); border: none; border-radius: 6px; color: #fff;">
            <button id="loginBtn" style="width: 100%; padding: 12px; background: #f4d03f; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;">Connect</button>
            <p id="loginError" style="color: #e74c3c; margin-top: 12px; display: none;">Invalid credentials</p>
        </div>
    </div>

    <!-- Column 1: Server Sidebar -->
    <nav class="guilds-bar" id="guildsBar">
        <div class="guild-icon active" style="font-weight:bold; font-size:0.9rem; color:var(--banana)">M.C</div>
        <!-- Injected via JS -->
    </nav>

    <!-- Column 2: Channels Menu -->
    <aside class="channels-sidebar">
        <div class="server-header" id="currentServerName">Monkey Servers</div>
        <div class="channel-list" id="channelListContainer">
            <!-- Injected via JS -->
        </div>
    </aside>

    <!-- Column 3: Call & Communications Center -->
    <main class="main-content">
        <div class="view-header" id="activeChannelHeader"># select-a-channel</div>
        
        <div class="content-split">
            <!-- Left Half: Videos -->
            <div class="video-arena">
                <div class="video-grid" id="videoGrid">
                    <!-- Local and Remote Video Boxes will spawn here dynamically -->
                </div>

                <div class="dock" id="voiceDock" style="display: none;">
                    <button id="toggleMic">🎙️</button>
                    <button id="toggleVid">📹</button>
                    <button class="hangup" id="disconnectVoice">❌</button>
                </div>
            </div>

            <!-- Right Half: Chat -->
            <div class="chat-sub-panel">
                <div class="msg-feed" id="msgFeed"></div>
                <div class="input-bar">
                    <input type="text" id="textInput" placeholder="Message channel...">
                </div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
